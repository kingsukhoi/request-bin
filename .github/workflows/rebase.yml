name: Rebase Container

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/rebase.yml
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  rebase:
    concurrency:
      group: "rebase-container"
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v4.2.0
      - name: Log in to the Container registry
        uses: docker/login-action@v4.4.0
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: setup-tools
        uses: buildpacks/github-actions/setup-tools@v6.0.0
      - id: setup-pack
        uses: buildpacks/github-actions/setup-pack@v6.0.0
      - name: Rebase all tags
        env:
          REPO: ${{ github.repository }}
        run: |
          DIGEST=$(crane digest ghcr.io/${REPO}:latest)
          while IFS= read -r TAG; do
            TAG_DIGEST=$(crane digest "ghcr.io/${REPO}:${TAG}" 2>/dev/null || true)
            if [ "${TAG_DIGEST}" = "${DIGEST}" ]; then
              pack rebase "ghcr.io/${REPO}:${TAG}" --publish 
            fi
          done < <(crane ls "ghcr.io/${REPO}")
      - uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          packages: "${{ github.event.repository.name }}"
          delete-orphaned-images: true
          delete-ghost-images: true
          delete-untagged: true
          exclude-tags: 'latest'
          keep-n-tagged: 10
