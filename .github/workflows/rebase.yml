name: Rebase Container

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/rebase.yml
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  rebase:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v4.2.0
      - name: Log in to the Container registry
        uses: docker/login-action@v4.4.0
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: setup-tools
        uses: buildpacks/github-actions/setup-tools@v5.12.5
      - id: setup-pack
        uses: buildpacks/github-actions/setup-pack@v5.12.5
      - name: Cache
        uses: actions/cache@v6
        with:
          path: ./pack-cache
          key: rebase-cache
      - name: Rebase all tags
        env:
          REPO: ${{ github.repository }}
        run: |
          DIGEST=$(crane digest ghcr.io/${REPO}:latest)
          while IFS= read -r TAG; do
            TAG_DIGEST=$(crane digest "ghcr.io/${REPO}:${TAG}" 2>/dev/null || true)
            if [ "${TAG_DIGEST}" = "${DIGEST}" ]; then
              pack rebase "ghcr.io/${REPO}:${TAG}" --publish 
            fi
          done < <(crane ls "ghcr.io/${REPO}")
