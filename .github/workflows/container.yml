# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Build Container

on:
  push:
    branches: ["master"]
    paths-ignore:
      - qodana.yaml
      - sqlc.yaml
      - http.http
      - query.sql
      - docker-compose.yaml
      - .gitignore
      - .github/dependabot.yml
      - README.md
      - frontend/README.md

jobs:
  build:
    concurrency:
      group: "build-container"
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      packages: write
      attestations: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Enable corepack
        run: cd frontend && corepack enable
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: "./frontend/package.json"
          cache-dependency-path: './frontend/pnpm-lock.yaml'
          cache: pnpm
      - name: build frontend
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm run build
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v4.0.0
      - name: Log in to the Container registry
        uses: docker/login-action@v4.1.0
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: setup-tools
        uses: buildpacks/github-actions/setup-tools@v5.12.0
      - id: setup-pack
        uses: buildpacks/github-actions/setup-pack@v5.12.0
      - name: Get Short SHA
        id: shortsha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Cache
        uses: actions/cache@v5
        with:
          path: ./pack-cache
          key: "${{ hashFiles('go.mod', 'go.sum') }}"
      - name: Build Container
        id: build
        run: |
          pack build --publish ghcr.io/${{github.repository}}:${{ github.sha }}  -t ghcr.io/${{github.repository}}:latest -t ghcr.io/${{github.repository}}:${{ steps.shortsha.outputs.sha_short }} -B paketobuildpacks/builder-jammy-tiny \
            --env BP_GO_TARGETS="cmd/web" --env BP_JSON_LOGS="true" --env BP_FRONT_END_PATH="/workspace/frontend/dist" --env BP_KEEP_FILES="frontend/dist/*" --cache='type=build;format=bind;source=./pack-cache'
          docker pull ghcr.io/${{github.repository}}:${{ github.sha }} > /dev/null
          echo "image_sha=$(docker image inspect ghcr.io/${{github.repository}}:${{ github.sha }} | jq '.[0].RepoDigests[0]' | cut -d ':' -f 2 | cut -d '"' -f 1)" >> $GITHUB_OUTPUT